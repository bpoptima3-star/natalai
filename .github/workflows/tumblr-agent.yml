name: Tumblr Cross-poster

on:
  schedule:
    - cron: '30 * * * *'   # 30 mins past every hour (offset from blog agent)
  workflow_dispatch:

jobs:
  crosspost:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tumblr cross-poster
        env:
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_TOKEN_SECRET: ${{ secrets.TUMBLR_OAUTH_TOKEN_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/tumblr-agent.js
      - name: Commit updated articles.json
        run: |
          git config user.name "NatalAI Tumblr Agent"
          git config user.email "agent@natalai.live"
          git add blog/articles.json
          git diff --staged --quiet || git commit -m "Tumblr: posted $(date +'%Y-%m-%d %H:%M')"
          git push
