name: YouTube Shorts Agent

on:
  schedule:
    - cron: '0 14 * * *'   # 2pm UTC daily (good time for US audience)
  workflow_dispatch:

jobs:
  create-short:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg espeak

      - name: Run YouTube agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_TTS_KEY: ${{ secrets.GOOGLE_TTS_KEY }}
        run: node scripts/youtube-agent.js

      - name: Commit log
        run: |
          git config user.name "NatalAI YouTube Agent"
          git config user.email "agent@natalai.live"
          git add blog/youtube-posts.json
          git diff --staged --quiet || git commit -m "YouTube: new short $(date +'%Y-%m-%d')"
          git push
