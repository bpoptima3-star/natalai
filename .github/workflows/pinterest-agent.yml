name: Pinterest Agent

on:
  schedule:
    - cron: '0 10 * * *'    # 10am UTC daily
  workflow_dispatch:          # manual trigger from Actions tab

jobs:
  post-pin:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Pinterest agent
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pinterest-agent.js

      - name: Commit pins log
        run: |
          git config user.name "NatalAI Pinterest Agent"
          git config user.email "agent@natalai.live"
          git add blog/pins.json
          git diff --staged --quiet || git commit -m "Pinterest: new pin $(date +'%Y-%m-%d')"
          git push
